<div class="min-h-screen bg-slate-100 text-slate-900">
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex w-full max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-3">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-teal-700">AxiomLMS</p>
        <h1 class="text-xl font-semibold">Frontend Enterprise Console</h1>
      </div>

      <nav class="flex items-center gap-2 rounded-full bg-slate-100 p-1">
        <a
          class="rounded-full px-4 py-2 text-sm font-medium transition"
          routerLink="/student"
          routerLinkActive="bg-white text-teal-700 shadow"
        >
          Student
        </a>
        <a
          class="rounded-full px-4 py-2 text-sm font-medium transition"
          routerLink="/tutor"
          routerLinkActive="bg-white text-teal-700 shadow"
        >
          Tutor
        </a>
      </nav>

      <div class="flex flex-wrap items-center gap-2">
        <button
          class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium transition hover:bg-slate-50"
          type="button"
          (click)="setRole('STUDENT')"
        >
          Perfil Student
        </button>
        <button
          class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium transition hover:bg-slate-50"
          type="button"
          (click)="setRole('TUTOR')"
        >
          Perfil Tutor
        </button>
        <p-button label="Salir" severity="danger" size="small" (onClick)="logout()" />
      </div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-7xl px-4 py-6">
    <router-outlet />
  </main>
</div>
