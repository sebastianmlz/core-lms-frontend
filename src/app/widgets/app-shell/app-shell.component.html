<p-toast position="bottom-right" [breakpoints]="{'920px': {width: '100%', right: '0', left: '0'}}" />
<div class="min-h-screen bg-slate-100 text-slate-900">
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex w-full max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-3">
      <div class="flex-1">
        <a routerLink="/" class="flex items-center gap-3 no-underline group w-fit">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-teal-600 text-white shadow-xl group-hover:bg-teal-700 transition-all group-hover:scale-105 transform">
            <span class="text-2xl font-black">A</span>
          </div>
          <h1 class="text-3xl font-black tracking-tighter text-slate-900 leading-none">
            Axiom<span class="text-teal-600">LMS</span>
          </h1>
        </a>
      </div>

      <div class="hidden md:flex flex-1 justify-center items-center">
        <div class="flex items-center gap-3 px-5 py-2 rounded-full bg-white border border-slate-200 shadow-sm hover:shadow-md transition-shadow cursor-default">
          <div class="h-2.5 w-2.5 rounded-full animate-pulse bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></div>
          <span class="text-xs font-black text-slate-700 uppercase tracking-widest">
            {{ sessionStore.username() }}
          </span>
        </div>
      </div>

      <div class="flex-1 flex items-center justify-end gap-3">
        <p-button 
          label="Salir" 
          severity="danger" 
          size="small" 
          (onClick)="logout()" 
        />
      </div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-7xl px-4 py-6">
    <router-outlet />
  </main>
</div>
