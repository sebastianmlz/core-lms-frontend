<section class="space-y-6">
  <header class="tutor-hero rounded-2xl p-6 text-white shadow-lg">
    <p class="text-xs font-semibold uppercase tracking-[0.25em] text-cyan-200">Tutor Workspace</p>
    <h2 class="mt-2 text-2xl font-bold">Analitica y Sombra Cognitiva</h2>
    <p class="mt-2 max-w-3xl text-sm text-slate-200">
      Consulta estructura academica, monitorea conceptos fallidos y visualiza dependencias para intervencion temprana.
    </p>
  </header>

  <div class="grid gap-6 xl:grid-cols-[1fr_1.3fr]">
    <section class="space-y-4 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <h3 class="text-lg font-semibold text-slate-900">Solicitar grafo cognitivo</h3>

      <form class="space-y-3" [formGroup]="graphForm" (ngSubmit)="loadGraph()">
        <label class="block space-y-1 text-sm font-medium text-slate-700">
          <span>Student ID</span>
          <input
            class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-cyan-500 focus:outline-none"
            formControlName="studentId"
            placeholder="student-42"
            type="text"
          />
        </label>

        <label class="block space-y-1 text-sm font-medium text-slate-700">
          <div class="flex items-center justify-between gap-2">
            <span>Topics fallidos</span>
            <button
              class="rounded-md border border-cyan-200 px-2 py-1 text-xs font-medium text-cyan-700 transition hover:bg-cyan-50 disabled:cursor-not-allowed disabled:opacity-50"
              [disabled]="!courseStore.selectedCourseDashboard()"
              type="button"
              (click)="useSuggestedTopics()"
            >
              Usar top failed
            </button>
          </div>
          <input
            class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-cyan-500 focus:outline-none"
            formControlName="topics"
            placeholder="Polymorphism, Recursion"
            type="text"
          />
        </label>

        <p-button
          [loading]="reasoningStore.isLoadingGraph()"
          [disabled]="reasoningStore.isLoadingGraph()"
          label="Cargar sombra"
          type="submit"
        />
      </form>

      @if (reasoningStore.error(); as errorMessage) {
        <p class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
          {{ errorMessage }}
        </p>
      }

      <app-course-overview [enableTutorAnalytics]="true" />
    </section>

    <app-cognitive-shadow
      [edges]="reasoningStore.cognitiveGraph()?.edges ?? []"
      [nodes]="reasoningStore.cognitiveGraph()?.nodes ?? []"
    />
  </div>
</section>
