<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-2">
    <div>
      <h2 class="text-lg font-semibold">Sombra Cognitiva</h2>
      <p class="text-sm text-slate-600">
        failed = rojo, learning = amarillo, mastered = verde.
      </p>
    </div>
    <p class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-medium text-slate-700">
      Nodos: {{ nodes.length }} | Aristas: {{ edges.length }}
    </p>
  </header>

  <div class="mb-4 flex flex-wrap gap-2 text-xs">
    <span class="rounded-full bg-red-100 px-3 py-1 font-semibold text-red-700">failed</span>
    <span class="rounded-full bg-yellow-100 px-3 py-1 font-semibold text-yellow-700">learning</span>
    <span class="rounded-full bg-emerald-100 px-3 py-1 font-semibold text-emerald-700">mastered</span>
  </div>

  <div class="graph-shell relative">
    <div #graphHost class="h-[380px] w-full rounded-xl border border-slate-200 bg-slate-50"></div>

    @if (nodes.length === 0) {
      <div class="absolute inset-0 flex items-center justify-center rounded-xl bg-slate-50/90">
        <p class="max-w-xs text-center text-sm text-slate-500">
          Carga un estudiante y topics fallidos para visualizar el grafo cognitivo.
        </p>
      </div>
    }
  </div>
</section>
